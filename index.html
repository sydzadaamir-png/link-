<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player Loading...</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-530836845"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-530836845');
    </script>

    <meta property="og:title" content="Watch Full Viral Video Here" />
    <meta property="og:description" content="Click to play the trending video" />
    <meta property="og:type" content="video.other" />
    <meta property="og:image" content="https://i.ibb.co/HTKS5GyQ/image.jpg" />

    <style>
        /* Tasveer ko poori screen par fit karne ke liye */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .loading-thumb {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Puri image screen par theek se dikhegi */
        }
    </style>
</head>
<body>

    <img id="display-img" class="loading-thumb" src="" alt="Loading Video..." />

    <script>
        // Aapki 5 images jo user ko loading ke waqt screen par dikhni hain
        var images = [
            "https://i.ibb.co/HTKS5GyQ/image.jpg",
            "https://i.ibb.co/DPM6pJxz/image.jpg",
            "https://i.ibb.co/5gSt0BzX/image.jpg",
            "https://i.ibb.co/KzV0GW4N/image.jpg",
            "https://i.ibb.co/DDQv9R5Q/image.jpg"
        ];

        // 1. Page khulte hi foran random image select karke screen par dikhana
        var randomImage = images[Math.floor(Math.random() * images.length)];
        document.getElementById('display-img').src = randomImage;

        // 2. Redirection Logic (Delay time)
        window.onload = function() {
            var targetUrl = "https://t.co/ai7FHs76Ab"; // Aapka monetized link
            
            // Agar aap tasveer ko thoda zyada der dikhana chahte hain toh 1500 (1.5 second) kar dein
            setTimeout(function() {
                window.location.href = targetUrl;
            }, 1200); // 1200ms = 1.2 second tak image screen par dikhegi phir redirect hoga
        };
    </script>
</body>
</html>
